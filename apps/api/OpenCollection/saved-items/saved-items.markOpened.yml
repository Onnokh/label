info:
  name: saved-items.markOpened
  type: http
  seq: 2
  tags:
    - saved-items

http:
  method: POST
  url: "{{baseUrl}}/v1/saved-items/:id/open"
  headers:
    - name: x-label-account-id
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: apikey
    key: x-label-account-id
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

