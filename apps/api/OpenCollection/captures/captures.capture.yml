info:
  name: captures.capture
  type: http
  seq: 1
  tags:
    - captures

http:
  method: POST
  url: "{{baseUrl}}/v1/captures"
  body:
    type: json
    data: |-
      {
        "url": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: CaptureUpdated
    request:
      url: "{{baseUrl}}/v1/captures"
      method: POST
      body:
        type: json
        data: |-
          {
            "url": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "savedItem": {
              "id": "",
              "accountId": "",
              "originalUrl": "",
              "normalizedUrl": "",
              "host": "",
              "title": "",
              "description": "",
              "siteName": "",
              "imageUrl": "",
              "canonicalUrl": "",
              "previewSummary": "",
              "generatedType": "",
              "generatedTopics": [],
              "enrichmentStatus": "pending",
              "isRead": false,
              "lastSavedAt": "",
              "createdAt": "",
              "updatedAt": ""
            },
            "captureResult": "updated"
          }
  - name: 201 Response
    description: CaptureCreated
    request:
      url: "{{baseUrl}}/v1/captures"
      method: POST
      body:
        type: json
        data: |-
          {
            "url": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "savedItem": {
              "id": "",
              "accountId": "",
              "originalUrl": "",
              "normalizedUrl": "",
              "host": "",
              "title": "",
              "description": "",
              "siteName": "",
              "imageUrl": "",
              "canonicalUrl": "",
              "previewSummary": "",
              "generatedType": "",
              "generatedTopics": [],
              "enrichmentStatus": "pending",
              "isRead": false,
              "lastSavedAt": "",
              "createdAt": "",
              "updatedAt": ""
            },
            "captureResult": "created"
          }
  - name: 400 Response
    description: InvalidUrlError
    request:
      url: "{{baseUrl}}/v1/captures"
      method: POST
      body:
        type: json
        data: |-
          {
            "url": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "_tag": "InvalidUrlError",
            "url": ""
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/v1/captures"
      method: POST
      body:
        type: json
        data: |-
          {
            "url": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "_tag": "Unauthorized",
            "message": ""
          }
